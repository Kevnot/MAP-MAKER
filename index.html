<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NeonGrid Forge</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#020617">

<style>

body{
background:#020617;
color:white;
font-family:Arial;
margin:0;
}

.container{
display:grid;
grid-template-columns:320px 1fr 260px;
height:100vh;
}

.panel{
padding:20px;
background:#0f172a;
overflow:auto;
}

.map{
display:grid;
place-items:center;
background:#020617;
}

.grid{
display:grid;
gap:2px;
background:#000;
}

.cell{
width:40px;
height:40px;
background:#334155;
cursor:pointer;
}

.button{
background:#9333ea;
padding:10px;
border-radius:8px;
margin-top:10px;
cursor:pointer;
text-align:center;
}

input,textarea,select{
width:100%;
margin-top:6px;
margin-bottom:12px;
padding:8px;
background:#020617;
border:1px solid #334155;
color:white;
border-radius:6px;
}

.tile{
padding:8px;
margin-bottom:6px;
border-radius:6px;
cursor:pointer;
background:#1e293b;
}

.tile:hover{
background:#334155;
}

</style>
</head>


<body>

<div class="container">

<div class="panel">

<h2>Generator</h2>

<label>Theme</label>
<select id="theme">
<option>Cyberpunk</option>
<option>Shadowrun</option>
<option>SciFi</option>
</select>

<label>Map Prompt</label>
<textarea id="prompt">Cyberpunk Nightclub mit VIP Bereich, Fluchtroute, Serverraum</textarea>

<div class="button" onclick="promptMap()">Prompt → Map</div>
<div class="button" onclick="cityBlock()">City Block</div>

<label>Zeilen</label>
<input id="rows" value="14">

<label>Spalten</label>
<input id="cols" value="18">

<div class="button" onclick="generate()">Generieren</div>
<div class="button" onclick="clearMap()">Leeren</div>

<div class="button" onclick="exportPNG()">PNG Export</div>

</div>


<div class="map">

<div id="grid" class="grid"></div>

</div>


<div class="panel">

<h2>Tiles</h2>

<div class="tile" onclick="selectTile('road')">Straße</div>
<div class="tile" onclick="selectTile('sidewalk')">Gehweg</div>
<div class="tile" onclick="selectTile('room')">Innenraum</div>
<div class="tile" onclick="selectTile('wall')">Wand</div>
<div class="tile" onclick="selectTile('door')">Tür</div>
<div class="tile" onclick="selectTile('terminal')">Terminal</div>
<div class="tile" onclick="selectTile('crate')">Kiste</div>
<div class="tile" onclick="selectTile('vehicle')">Fahrzeug</div>
<div class="tile" onclick="selectTile('camera')">Kamera</div>

</div>

</div>

<script>

let selectedTile="road"
let grid=[]

function selectTile(t){
selectedTile=t
}

function generate(){

let rows=parseInt(rowsInput().value)
let cols=parseInt(colsInput().value)

grid=[]
gridDiv().innerHTML=""

gridDiv().style.gridTemplateColumns="repeat("+cols+",40px)"

for(let r=0;r<rows;r++){

grid[r]=[]

for(let c=0;c<cols;c++){

grid[r][c]="room"

let cell=document.createElement("div")
cell.className="cell"

cell.onclick=()=>{
grid[r][c]=selectedTile
drawCell(cell,selectedTile)
}

drawCell(cell,"room")

gridDiv().appendChild(cell)

}

}

}

function drawCell(cell,type){

let colors={
road:"#374151",
sidewalk:"#6b7280",
room:"#64748b",
wall:"#e2e8f0",
door:"#d97706",
terminal:"#10b981",
crate:"#8b5a2b",
vehicle:"#ef4444",
camera:"#cbd5e1"
}

cell.style.background=colors[type]||"#334155"

}

function promptMap(){

let text=document.getElementById("prompt").value.toLowerCase()

generate()

if(text.includes("nightclub")){

for(let r=5;r<9;r++){
for(let c=4;c<14;c++){
setTile(r,c,"road")
}
}

setTile(7,9,"terminal")

}

if(text.includes("server")){
setTile(3,3,"terminal")
}

if(text.includes("kamera")){
setTile(2,5,"camera")
setTile(2,12,"camera")
}

}

function cityBlock(){

generate()

let rows=grid.length
let cols=grid[0].length

let midR=Math.floor(rows/2)
let midC=Math.floor(cols/2)

for(let c=0;c<cols;c++)setTile(midR,c,"road")
for(let r=0;r<rows;r++)setTile(r,midC,"road")

}

function setTile(r,c,type){

grid[r][c]=type

let index=r*grid[0].length+c

drawCell(gridDiv().children[index],type)

}

function clearMap(){
generate()
}

function exportPNG(){

let canvas=document.createElement("canvas")

let rows=grid.length
let cols=grid[0].length

canvas.width=cols*40
canvas.height=rows*40

let ctx=canvas.getContext("2d")

for(let r=0;r<rows;r++){

for(let c=0;c<cols;c++){

let color={
road:"#374151",
sidewalk:"#6b7280",
room:"#64748b",
wall:"#e2e8f0",
door:"#d97706",
terminal:"#10b981",
crate:"#8b5a2b",
vehicle:"#ef4444",
camera:"#cbd5e1"
}[grid[r][c]]

ctx.fillStyle=color
ctx.fillRect(c*40,r*40,40,40)

}

}

let link=document.createElement("a")
link.download="map.png"
link.href=canvas.toDataURL()
link.click()

}

function gridDiv(){
return document.getElementById("grid")
}

function rowsInput(){
return document.getElementById("rows")
}

function colsInput(){
return document.getElementById("cols")
}

generate()

</script>

</body>
</html>
